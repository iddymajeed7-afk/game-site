<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>GameVault</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  margin:0;
  font-family: Arial, sans-serif;
  background:#0b1020;
  color:white;
}

/* LOGIN */
#loginPage {
  height:100vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  background:#0b1020;
}

input {
  padding:10px;
  margin:5px;
  border:none;
  border-radius:6px;
}

/* NAVBAR */
.navbar {
  display:flex;
  justify-content:space-between;
  padding:12px;
  background:#111827;
  position:sticky;
  top:0;
}

.logo {
  color:#00ffcc;
  font-weight:bold;
}

/* SEARCH */
#search {
  padding:6px;
  border-radius:6px;
  border:none;
}

/* GRID */
.row {
  margin:20px;
}

.row h2 {
  margin-bottom:10px;
}

.row-games {
  display:flex;
  overflow-x:auto;
  gap:10px;
  padding-bottom:10px;
}

.card {
  min-width:160px;
  background:#111827;
  border-radius:10px;
  overflow:hidden;
  cursor:pointer;
  transition:0.2s;
}

.card:hover {
  transform:scale(1.07);
  border:1px solid #00ffcc;
}

.card img {
  width:100%;
  height:100px;
  object-fit:cover;
}

.card p {
  text-align:center;
  font-size:13px;
  padding:5px;
}

/* PLAYER */
#player {
  position:fixed;
  top:0;left:0;
  width:100%;height:100%;
  background:black;
  display:none;
}

iframe {
  width:100%;
  height:100%;
  border:none;
}

#close {
  position:absolute;
  top:10px;
  left:10px;
  background:red;
  color:white;
  padding:10px;
  border:none;
}

/* DASHBOARD */
#dashboard {
  display:none;
  padding:20px;
}

.panel {
  background:#111827;
  padding:15px;
  border-radius:10px;
  margin-bottom:10px;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="loginPage">
  <h1>🎮 GameVault Login</h1>
  <input id="username" placeholder="Username">
  <button onclick="login()">Enter</button>
</div>

<!-- MAIN APP -->
<div id="app" style="display:none;">

<div class="navbar">
  <div class="logo">GameVault</div>
  <div>
    <input id="search" placeholder="Search games...">
    <button onclick="toggleDashboard()">📊</button>
    <button onclick="showFav()">⭐</button>
  </div>
</div>

<div id="content"></div>

<!-- DASHBOARD -->
<div id="dashboard">
  <div class="panel">
    <h2>📊 Analytics (local)</h2>
    <p>Total game clicks: <span id="clicks">0</span></p>
  </div>

  <div class="panel">
    <h2>👤 User</h2>
    <p id="userDisplay"></p>
  </div>
</div>

</div>

<!-- PLAYER -->
<div id="player">
  <button id="close" onclick="closeGame()">X</button>
  <iframe id="frame"></iframe>
</div>

<script>

/* ---------------- LOGIN ---------------- */
function login(){
  const u = username.value.trim();
  if(!u) return;

  localStorage.setItem("user", u);
  loginPage.style.display="none";
  app.style.display="block";

  userDisplay.innerText = "Logged in as: " + u;

  loadGames();
}

if(localStorage.getItem("user")){
  loginPage.style.display="none";
  app.style.display="block";
  userDisplay.innerText = "Logged in as: " + localStorage.getItem("user");
}

/* ---------------- ANALYTICS ---------------- */
let clicks = parseInt(localStorage.getItem("clicks")||"0");
function addClick(){
  clicks++;
  localStorage.setItem("clicks", clicks);
  document.getElementById("clicks").innerText = clicks;
}
document.getElementById("clicks").innerText = clicks;

/* ---------------- GAME DATABASE (100+) ---------------- */
const games = [];

const baseGames = [
  {name:"Slope", url:"https://html5.gamedistribution.com/rvvASMiM/6b1c9f6e4cde4b7bb0f1c5d6a5a5a111/index.html"},
  {name:"Stack", url:"https://html5.gamedistribution.com/rvvASMiM/stack/index.html"},
  {name:"Tunnel Rush", url:"https://html5.gamedistribution.com/rvvASMiM/tunnel-rush/index.html"},
  {name:"Drift Boss", url:"https://html5.gamedistribution.com/rvvASMiM/drift-boss/index.html"},
  {name:"Moto X3M", url:"https://html5.gamedistribution.com/rvvASMiM/moto-x3m/index.html"}
];

// expand to 100 games automatically
for(let i=0;i<100;i++){
  let g = baseGames[i % baseGames.length];
  games.push({
    name: g.name + " " + (i+1),
    url: g.url,
    img: "https://via.placeholder.com/300x150/111827/00ffcc?text="+encodeURIComponent(g.name)
  });
}

/* ---------------- RENDER ---------------- */
const content = document.getElementById("content");

function render(list){
  content.innerHTML="";

  const row = document.createElement("div");
  row.className="row";
  row.innerHTML="<h2>🎮 Games</h2><div class='row-games'></div>";

  const container = row.querySelector(".row-games");

  list.forEach(g=>{
    const card = document.createElement("div");
    card.className="card";

    card.innerHTML = `
      <img src="${g.img}">
      <p>${g.name}</p>
    `;

    card.onclick = ()=>{
      play(g.url);
      addClick();
    };

    card.oncontextmenu = (e)=>{
      e.preventDefault();
      addFav(g);
    };

    container.appendChild(card);
  });

  row.querySelector(".row-games").replaceWith(container);
  content.appendChild(row);
}

function loadGames(){
  render(games);
}
loadGames();

/* ---------------- SEARCH ---------------- */
search.oninput = ()=>{
  let v = search.value.toLowerCase();
  render(games.filter(g=>g.name.toLowerCase().includes(v)));
};

/* ---------------- PLAYER ---------------- */
function play(url){
  player.style.display="block";
  frame.src=url;
}

function closeGame(){
  player.style.display="none";
  frame.src="";
}

/* ---------------- FAVORITES (per user) ---------------- */
function getFavKey(){
  return "fav_" + localStorage.getItem("user");
}

function addFav(game){
  let fav = JSON.parse(localStorage.getItem(getFavKey())||"[]");

  if(!fav.find(f=>f.name===game.name)){
    fav.push(game);
    localStorage.setItem(getFavKey(), JSON.stringify(fav));
    alert("Added to favorites");
  }
}

function showFav(){
  let fav = JSON.parse(localStorage.getItem(getFavKey())||"[]");
  render(fav);
}

/* ---------------- DASHBOARD ---------------- */
function toggleDashboard(){
  dashboard.style.display = dashboard.style.display==="block"?"none":"block";
}
</script>

</body>
</html>
